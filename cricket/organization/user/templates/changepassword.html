{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>


    <style>
      body{
          margin:0; min-height:100vh;
          display:flex; justify-content:center;
          align-items:center;
          background:url("{% static 'back8.jpeg' %}") center/cover no-repeat;
          font-family:Arial;

      h3 { text-align: center;
          margin-top: 8px;}
      }
      form{
          background:rgba(74, 68, 77, 0.3); padding:20px;
          width:100%; max-width:250px;
          border-radius:6px; box-shadow:0 0 10px #ccc;
      }
      input{
          width:90%; padding:10px; margin:8px 0;
      }
      input[type=submit]{
          background:blue; color:#fff;
          border:none; cursor:pointer;
          width: 250px;
      }

      input[type=submit]:hover{
           background: green;
      }
</style>
</head>
<body>
      <form method="post">
        {% csrf_token %}
          <h3>Change password</h3>
        <input type="text" name="t1" placeholder="Old password" required> <br>
          {{msg2}}
        <input type="text" name="t2" placeholder="New password" required> <br>
        <input type="text" name="t3" placeholder="Confirm password" required>   <br>
        {{msg}}
        <input type="submit" value="Change Password">
      </form>
</body>
</html>
