<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Email</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#84fab0,#8fd3f4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background:#fff;
    width:100%;
    max-width:400px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
}
h2{
    text-align:center;
    margin-bottom:15px;
    color:#333;
}
label{
    font-size:14px;
    color:#444;
}
input{
    width:100%;
    padding:10px;
    margin:8px 0 12px;
    border:1px solid #ccc;
    border-radius:6px;
}
input[type="submit"]{
    background:#28a745;
    color:#fff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}
input[type="submit"]:hover{
    background:#1e7e34;
}
@media(max-width:480px){
    .container{margin:20px;}
}
</style>
</head>
<body>
<div class="container">
<h2>Send Email</h2>
<form method="POST">
{% csrf_token %}
<label>Email</label>
<input type="email" name="t1" placeholder="Enter email address">
<label>Message</label>
<input type="text" name="t2" placeholder="Enter message">
<input type="submit" name="t3" value="Send Email">
</form>
</div>
</body>
</html>
