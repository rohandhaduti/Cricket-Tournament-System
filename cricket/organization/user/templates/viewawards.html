<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awards Details</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin:0;
}
.wrapper{
    width:90%;
    margin:40px auto;
}
h1{
    text-align:center;
    margin-bottom:15px;
}
table{
    width:100%;
    max-width:800px;
    margin:auto;
    border-collapse:collapse;
    background:#fff;
}

th, td{
    padding:10px;
    text-align:center;
    border:1px solid #ccc;
}

th{
    background:#007bff;
    color:white;
}

tr:nth-child(even){
    background:#f2f2f2;
}

tr:hover{
    background:#e6f2ff;
}

a{
      color:green;
    font-weight:bold;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
    color: red;
}
@media(max-width:600px){
    table{
        font-size:12px;
    }
}
</style>
</head>

<body>

{% include 'user_menu.html' %}

<div class="wrapper">
<h1>Awards Information</h1>

<table>
    <tr>
        <th>Player ID</th>
        <th>Award Name</th>
        <th>Date</th>
    </tr>

    {% for i in userdict %}
    <tr>
        <td>{{ i.player_id }}</td>
        <td>{{ i.award_name }}</td>
        <td>{{ i.date }}</td>
        
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No awards found</td>
    </tr>
    {% endfor %}
</table>

</div>

</body>
</html>
