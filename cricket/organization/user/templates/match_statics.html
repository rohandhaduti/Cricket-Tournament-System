<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Statistics</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
}
.container{
    background:#fff;
    width:100%;
    max-width:450px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
    margin:70px auto;   /* space for organization_menu */
}
h1{
    text-align:center;
    font-size:22px;
    margin-bottom:15px;
    color:#333;
}
input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}
input[type="submit"]{
    background:#4a6cf7;
    color:#fff;
    border:none;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

input[type="submit"]:hover{
    background:#3b57d0;
}

p{
    color:gray;
    margin:6px 0;
}
@media(max-width:480px){
    .container{
        margin:90px 15px;
    }
    h1{
        font-size:18px;
    }
}
</style>
</head>

<body>

{% include 'organization_menu.html' %}

<div class="container">
<h1>Match Statistics</h1>

<form method="POST">
{% csrf_token %}

<input type="text" name="t1" value="{{s1}}" 
       placeholder="Match ID" required pattern="[0-9]+">

<input type="text" name="t2" 
       placeholder="Enter Team 1 Name" required pattern="[A-Za-z\s]+">

<input type="text" name="t3" 
       placeholder="Enter Team 2 Name" required pattern="[A-Za-z\s]+">

<input type="text" name="t4" 
       placeholder="Enter Team 1 Score" required pattern="[0-9/]+">

<input type="text" name="t5" 
       placeholder="Enter Team 2 Score" required pattern="[0-9/]+">

<input type="text" name="t6" 
       placeholder="Enter Team 1 Captain Name" required pattern="[A-Za-z\s]+">

<input type="text" name="t7" 
       placeholder="Enter  Team 2 Captain Name" required pattern="[A-Za-z\s]+">

<input type="text" name="t8" 
       placeholder="Enter Match Result" required>

<p>Match Type</p>
<select name="t9" required>
    <option value="">Select</option>
    <option value="Test">Test</option>
    <option value="ODI">ODI</option>
    <option value="T20">T20</option>
    <option value="T10">T10</option>
</select>

<p>Number of Overs</p>
<select name="t10" required>
    <option value="">Select</option>
    <option value="5 Days">5 Days</option>
    <option value="50">50</option>
    <option value="20">20</option>
    <option value="10">10</option>
</select>

<input type="submit" name="t11" value="Submit">

</form>
</div>

</body>
</html>
