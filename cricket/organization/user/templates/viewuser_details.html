<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Details</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
}

.container {
    margin: 40px auto;
    width: 95%;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

table {
    width: 100%;
    max-width: 1000px;
    margin: auto;
    border-collapse: collapse;
    background: #fff;
}

th, td {
    padding: 10px;
    text-align: center;
    border: 1px solid #ccc;
}

th {
    background: #007bff;
    color: white;
}

tbody tr:nth-child(even) {
    background: #f2f2f2;
}

tbody tr:hover {
    background: #e6f2ff;
}

a {
      color:green;
    font-weight: bold;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
    color: red;
}

@media (max-width: 768px) {
    table {
        font-size: 12px;
    }
}
</style>
</head>

<body>

{% include 'user_menu.html' %}

<div class="container">
<h1>User Details</h1>

<table>
    <thead>
        <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Address</th>
            <th>Email ID</th>
            <th>Aadhaar No</th>
            <th>Mobile No</th>
        </tr>
    </thead>

    <tbody>
        {% for i in userdict %}
        <tr>
            <td>{{ i.user_id }}</td>
            <td>{{ i.name }}</td>
            <td>{{ i.address }}</td>
            <td>{{ i.email_id }}</td>
            <td>{{ i.adhaar_no }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="7" style="text-align:center; font-weight:bold;">
                No users found
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</div>

</body>
</html>
